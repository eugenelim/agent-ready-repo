[pack]
name = "governance-extras"
version = "0.8.1"
description = "Governance skills (new-rfc, new-adr, update-conventions, rfc-status) and RFC/ADR templates + seed READMEs."
readme = "README.md"
display_name = "Governance Extras"
license = "Apache-2.0 OR MIT"
categories = ["governance", "documentation"]
keywords = ["rfc", "adr", "conventions"]

# Opt into the catalogue seed lint (RFC-0047 Decision 6 / ADR-0037 D4): a
# first-party scaffold pack, so `tools/lint-catalogue-seeds.py` enforces the
# RFC-0002 placeholder contract here. Catalogue-internal — not projected.
lint-seeds = true

# RFC-0004 v0.2 contract metadata. RFC/ADR ceremony is per-project, so
# the pack is declared repo-only.
[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "repo"
allowed-scopes = ["repo"]

# Per adapt-to-project AC17/AC18: enforced at install time against the
# union of both scopes' state files. Schema field already declared in
# docs/contracts/pack.schema.json; no new field is introduced.
[[pack.dependencies.required]]
catalogue = "agent-ready-repo"
pack = "core"
version = "^0.1"

# pack-activation-evals (RFC-0037 / ADR-0028): the Tier-A activation-eval
# coverage allowlist. Each listed skill ships evals/eval_queries.json and is
# measured by tools/run-pack-evals.py. All four governance-extras skills are
# user-triggered judgment/authoring skills, so all four are covered; new-adr,
# new-rfc, and update-conventions also ship Tier-4 LLM-judge rubrics
# (evals/evals.json, keyed by file presence, graded via --mode judge);
# rfc-status is read-only and ships eval_queries.json only. No skill is
# excluded — the pack has no reviewer-internal / non-prompt skill (unlike
# core's security-checklists).
[pack.evals]
skills = ["new-adr", "new-rfc", "update-conventions", "rfc-status"]

# enriched-pack-manifest (RFC-0031 / ADR-0021): catalogue-facing links
# + maintainer, including the `documentation` link to the per-pack guide home.
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/governance-extras/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: mixed audience (teams making architectural decisions); RFC-0064 "preview-confirm write" archetype — writes shared governance records.
[pack.first-value]
audience-posture = "mixed"
surfaces         = ["claude-code"]
prerequisites    = ["core pack installed at repo scope"]
verification     = "Run rfc-status and confirm it lists the RFC lifecycle states without error."
recovery         = "If rfc-status fails, confirm governance-extras is installed at repo scope; check that docs/rfc/ exists in your repo."
level-b          = true
writes-to-repo   = true
starter-task     = "Record an architectural decision your team has already made"
starter-prompt   = "Create an ADR for the decision to use TOML as the format for our workspace coordination file."
expected-result  = "A new ADR file in docs/adr/ that records the decision, its rationale, and the alternatives considered."
next-action      = "Share the ADR with your team and link to it from the relevant code or config file."
safety-gate      = "The new-adr skill shows you a preview of the ADR content and the target file path before writing anything. Confirm the preview before the file is created."
