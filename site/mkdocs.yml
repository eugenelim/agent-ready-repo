site_name: agent-ready-repo
site_description: The complete AI operating model for software teams — from first idea to production.
site_url: https://eugenelim.github.io/agent-ready-repo/docs/
repo_url: https://github.com/eugenelim/agent-ready-repo
repo_name: eugenelim/agent-ready-repo
edit_uri: ""

docs_dir: docs
# Co-deployed with the Astro marketing site (RFC-0061): Astro builds into
# `build/` first, then MkDocs writes here — `build/docs/` — as the `/docs/`
# subsection. Astro's build cleans `build/`, so it MUST run before MkDocs.
site_dir: ../build/docs

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-outline

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eugenelim/agent-ready-repo
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentbundle/
  generator: false

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.snippets

