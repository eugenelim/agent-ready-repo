[pack]
name = "experience-design"
version = "1.6.1"
description = "The design/UX seat for product teams — the grown-up successor to design-craft. Connective skills walk the thread from outcome to realization (journey-mapping → content-design → copy-direction → tone-of-voice → user-flow → service-blueprint) and map the inside-out sibling (process-mapping); craft skills design each screen (creative-direction, design-token-taxonomy, design-system-foundations, information-architecture, interaction-design) and critique it (design-review), all held to one shared quality-floor (handle-all-states, accessibility floor, reduced-motion). A forked-context experience-reviewer gives the design step an independent design-time review. Pure method: no stack, no values tables, no pixel comps — points to WCAG / Design Tokens Community Group (DTCG) / Apple HIG / Material 3 / APQC / BPMN, never reprints them."
readme = "README.md"
display_name = "Experience Design"
license = "Apache-2.0 OR MIT"
categories = ["design", "documentation"]
keywords = ["customer-journey", "service-blueprint", "interaction-design", "design-systems", "heuristic-evaluation"]

# Pure-markdown SKILL.md surface — no adapter-specific primitives, so it
# travels with every shipped adapter that projects the skill primitive.
# Contract v0.12 matches `desk-research` (RFC-0033 OQ#1 default): the level at
# which Copilot's skill primitive projects as a first-class Agent Skill.
[pack.adapter-contract]
version = "0.12"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# Experience method is portable, not project-specific — user-scope by
# default, like `architect`/`desk-research`. Pure-markdown skills + skill
# assets/, no `seeds/` (RFC-0004 Rail A), so it projects to every shipped
# adapter that supports the skill primitive. Declared order is load-bearing
# (RFC-0011): append-only; `kiro-ide` precedes `kiro-cli`.
allowed-adapters = ["claude-code", "codex", "copilot", "kiro-ide", "kiro-cli", "cursor", "gemini"]

# consolidated-pack-layout (RFC-0040 / ADR-0030): the artifact-writing skills
# resolve their durable output path via the adopter-owned `[design]` section of
# agentbundle-layout.toml (repo-root first, user-profile second). `output_dir` is
# a base; each skill writes file-per-slug under a subdirectory of it (journeys/,
# blueprints/, screens/, processes/). No `[pack.layout.user]` default — output is
# per-repo, with no sensible absolute user-scope base.
# Each artifact-writing skill ships a references/agentbundle-layout.md documenting
# the adopter-owned `[design]` table.
[pack.layout.repo]
output_dir = "docs/design"

# pack-activation-evals (RFC-0037 / ADR-0028): the Tier-A activation-eval
# coverage allowlist. Each listed skill ships evals/eval_queries.json and is
# measured by tools/run-pack-evals.py. The judgment/authoring skills (all
# except experience-status) also ship a Tier-4 LLM-judge rubric
# (evals/evals.json, keyed by file presence, graded via --mode judge).
# `experience-status` is a read-only orient skill that writes no files, so it
# ships eval_queries.json only (activation coverage) — no evals.json judge
# rubric (there is no file presence to key on). The `experience-reviewer`
# agent is a role-match-dispatched primitive, not a Skill-router-activated
# skill, so it is not listed here (its eval surface is its review-list output
# contract + manual-QA dispatch; RFC-0050 § Errata).
[pack.evals]
skills = ["creative-direction", "content-design", "copy-direction", "tone-of-voice", "design-review", "design-token-taxonomy", "design-system-foundations", "information-architecture", "journey-mapping", "service-blueprint", "user-flow", "process-mapping", "interaction-design", "experience-status", "design-principles", "analytical-design", "conversion-design", "documentation-design", "informational-design", "marketplace-design", "workspace-design"]

# enriched-pack-manifest (RFC-0031 / ADR-0021): catalogue-facing links
# + maintainer, including the `documentation` link to the per-pack guide home.
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/experience-design/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: mixed audience (designers + PMs); journey mapping value is clear for non-technical stakeholders.
[pack.first-value]
audience-posture = "mixed"
surfaces         = ["claude-code"]
prerequisites    = []
verification     = "Run journey-mapping on a customer scenario and confirm a journey map file is created in docs/design/journeys/."
recovery         = "If the skill does not produce output, confirm the pack is installed and run adapt-to-project to refresh the skill index."
level-b          = true
starter-task     = "Map a customer journey for a key user scenario in your product"
starter-prompt   = "Create a customer journey map for a user who wants to onboard to our product for the first time."
expected-result  = "A journey map file in docs/design/journeys/ with the onboarding flow's stages, user actions, touchpoints, and pain points."
next-action      = "Use the journey map to identify the most painful step and open a brief to improve it."
