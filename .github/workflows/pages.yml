name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment; cancel in-flight runs on new push.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-revision-date plugin

      # ── Astro marketing site FIRST (RFC-0061) ───────────────────────────
      # `astro build` cleans its outDir (build/) on every run, so it must run
      # BEFORE MkDocs writes into build/docs/ — otherwise MkDocs output is wiped.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Build Astro marketing site
        run: npm run build --prefix web  # writes build/ at repo root
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      # ── MkDocs reference docs SECOND — writes into build/docs/ ───────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: site/requirements.txt

      - name: Install site dependencies
        run: pip install -r site/requirements.txt

      - name: Aggregate content
        run: python tools/build-site.py

      - name: Build site
        run: mkdocs build --config-file site/mkdocs.yml --strict
        env:
          # Suppress git-revision-date warnings when history is shallow
          CI: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
