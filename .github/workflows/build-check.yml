name: build-check

# Self-hosting gate (Phase 1): runs `make build-check` against every PR
# targeting main. Refuses to merge if any Phase-1 *Projected* path on
# disk drifted from what the build pipeline emits. See
# docs/specs/self-hosting/spec.md § Phased rollout.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-check:
    name: make build-check
    runs-on: ubuntu-latest
    # Bumped 5 → 15 (ADR-0017): `make build-check` now chains `make sast`, whose
    # Semgrep leg fetches registry rulesets and scans ~76k LOC.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the SAST-relevance diff below can reach the PR's
          # merge-base. (check-adr-immutability in docs.yml also uses
          # fetch-depth: 0, though it diffs 2-dot rather than the 3-dot
          # merge-base form used here.)
          fetch-depth: 0

      # SAST is relevant to a PR when it touches either the scanned dirs
      # (SAST_DIRS) or the gate's own config/CI surface (SAST_CONFIG — e.g.
      # bandit.yaml, this workflow). A PR that touches neither has nothing to
      # scan, so skip that leg — the job still runs (it is the required check)
      # and its drift + lint gates still execute. Push-to-main always runs SAST
      # (this step is PR-only; github.event.pull_request.base.sha is absent on
      # push), so post-merge keeps a full pass as belt-and-braces.
      #
      # Two safety properties:
      #   - Single source of truth: both lists are read from the Makefile, so
      #     the predicate can't drift from SAST_DIRS / SAST_CONFIG.
      #   - Fail CLOSED: any error reading the scope or the changed-file set
      #     routes to skip_sast=false, so uncertain detection runs SAST. And
      #     because SAST_CONFIG includes this workflow + bandit.yaml, a PR that
      #     loosens the gate is itself scanned by the gate it changes.
      - name: Detect whether SAST-relevant files changed
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          dirs=$(make -s print-sast-dirs) || {
            echo "::warning::Could not read SAST_DIRS from Makefile — running SAST (fail-closed)."
            echo "skip_sast=false" >> "$GITHUB_OUTPUT"; exit 0; }
          cfg=$(make -s print-sast-config) || {
            echo "::warning::Could not read SAST_CONFIG from Makefile — running SAST (fail-closed)."
            echo "skip_sast=false" >> "$GITHUB_OUTPUT"; exit 0; }
          changed=$(git diff --name-only "$base"..."$head") || {
            echo "::warning::Could not compute changed files — running SAST (fail-closed)."
            echo "skip_sast=false" >> "$GITHUB_OUTPUT"; exit 0; }
          dir_pat="^($(echo "$dirs" | tr ' ' '|'))/"
          run=false
          # Any file under a scanned dir → SAST is relevant.
          if printf '%s\n' "$changed" | grep -qE "$dir_pat"; then run=true; fi
          # Any edit to the gate's config/CI surface → SAST must run so the
          # change is validated by the gate it changes. Whole-line fixed-string
          # match (paths contain regex metachars like '.').
          for c in $cfg; do
            if printf '%s\n' "$changed" | grep -qxF "$c"; then run=true; fi
          done
          if [ "$run" = true ]; then
            echo "skip_sast=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip_sast=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No SAST-relevant files changed (dirs: [$dirs]; config: [$cfg]) — skipping SAST/SCA gate."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools dependencies
        # `make build-check` chains `tools/hooks/pre-pr.py`, which calls
        # `tools/lint-agent-artifacts.py` (and siblings) — those import
        # PyYAML from tools/requirements.txt. Install before invoking make
        # so the projected-artifact lint surface is reachable in CI.
        run: pip install -r tools/requirements.txt

      - name: Install SAST/SCA tools
        # `make build-check` chains `make sast` (ADR-0017), which needs Bandit,
        # pip-audit, and Semgrep on PATH. Install before invoking make so the
        # dogfooded SAST gate is reachable. The shipped packages stay
        # dependency-free; these are CI-only dev tools. Skipped when the diff
        # touches no SAST-relevant file (see the detection step above) — the
        # SKIP_SAST flag below bypasses the scan, so the tools needn't be
        # installed.
        if: steps.changes.outputs.skip_sast != 'true'
        run: pip install -r tools/requirements-sast.txt

      - name: Run make build-check
        # Pass SKIP_SAST=1 only when the diff touches no SAST-relevant file; the
        # Makefile then skips the SAST/SCA leg while still running every drift
        # and lint gate. Empty string (the default / push-to-main) runs SAST.
        run: make build-check PACKS_DIR=packs ${{ steps.changes.outputs.skip_sast == 'true' && 'SKIP_SAST=1' || '' }}

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install agentbundle (editable) + pytest
        run: pip install -e packages/agentbundle/ pytest

      - name: pytest converters install/uninstall (AC6a)
        working-directory: packages/agentbundle
        run: python -m pytest tests/integration/test_install_converters_user_scope.py

      # pack-profiles (RFC-0034): the profile reader/schema, batch-aware dep
      # gate, CLI surface (mutex + list-profiles), and the install orchestrator.
      # make build-check runs no pytest, so wire these paths explicitly.
      - name: pytest pack-profiles (RFC-0034)
        working-directory: packages/agentbundle
        run: >-
          python -m pytest
          tests/unit/test_profile_reader.py
          tests/unit/test_dependencies_batch.py
          tests/unit/test_cli_profile_surface.py
          tests/integration/test_install_profile.py
          tests/integration/test_install_profile_live.py

      # credbroker-user-scope T1: consumer bootstraps append the vendored
      # ~/.agentbundle/lib floor at LOWEST sys.path precedence. The
      # no-insert-0 source guard enforces the spec's "never prepend"
      # Never-do across all six consumer scripts; the precedence proof is
      # platform-agnostic, so the Linux job gates it (make build-check runs
      # no pytest). Deps-free — the behavioral check uses a planted fake
      # credbroker, not httpx.
      - name: pytest credbroker floor precedence (credbroker-user-scope T1)
        working-directory: packages/agentbundle
        run: python -m pytest tests/integration/test_credbroker_floor_precedence.py

      # credbroker T9: RFC-0023 retired the shared-libs → consumer-scripts
      # projection (and its build-check drift gate). The standing net that
      # no shim copy reappears under a consumer scripts/ — and that the
      # companion-rail source is retained — is this test; wire it into CI
      # explicitly (make build-check runs no pytest).
      - name: pytest shared-libs projection retirement (credbroker T9)
        working-directory: packages/agentbundle
        run: python -m pytest agentbundle/build/tests/test_shared_libs_projection.py

      - name: Install credbroker (editable, with crypto extra)
        # Installing the [crypto] extra verifies it resolves (spec credbroker AC1)
        # AND runs the stdlib-purity gate under the *stronger* condition — with
        # cryptography/argon2 present, the subprocess still proves the base
        # import never reaches them (credbroker AC4). The vault tests that need
        # the extra arrive with task T4.
        run: pip install -e './packages/credbroker[crypto]'

      - name: pytest credbroker (RFC-0023 Phase 1)
        working-directory: packages/credbroker
        run: python -m pytest

      # credbroker-user-scope T3: the build pipeline vendors credbroker to the
      # per-scope lib floor (.agentbundle/lib/) + the catalogue pack copy,
      # drift-gated. `make build-check` exercises the live drift gate, but the
      # projection / purity / no-op-absent / two-target-topology / contract /
      # pack-invariant tests run only here (make build-check runs no pytest).
      # Placed AFTER the [crypto] install so the floor-purity subprocess proves
      # the base import stays third-party-free under the STRONGER condition —
      # cryptography/argon2 importable but unreached (mirrors credbroker AC4).
      - name: pytest user-libs vendored floor (credbroker-user-scope T3)
        working-directory: packages/agentbundle
        run: >-
          python -m pytest
          agentbundle/build/tests/test_user_libs_projection.py
          agentbundle/build/tests/test_contract.py
          tests/integration/test_build_check_drift_gates.py
          tests/integration/test_credential_brokers_pack_install.py

      # cursor-full-parity (RFC-0026): the cursor adapter's unit suite lives in
      # the build/tests root, which `make build-check` does not run. Wire it in
      # explicitly or it never gates (CI does not auto-discover package pytest).
      - name: pytest cursor adapter (cursor-full-parity)
        working-directory: packages/agentbundle
        run: python -m pytest agentbundle/build/tests/test_adapter_cursor.py

      # gemini-full-parity (RFC-0027): the gemini adapter's unit suite lives in
      # the build/tests root, which `make build-check` does not run. Wire it in
      # explicitly or it never gates (CI does not auto-discover package pytest).
      - name: pytest gemini adapter (gemini-full-parity)
        working-directory: packages/agentbundle
        run: python -m pytest agentbundle/build/tests/test_adapter_gemini.py

      # architect-design-reviewer (RFC-0032): the design-reviewer subagent's
      # cross-adapter projection check (AC10's "fails if a future adapter change
      # drops it") and its rubric-parity guard (the verdict / severity /
      # mechanical-judgment vocabulary must stay identical across the agent and
      # architect-review) live in the build/tests root, which `make build-check`
      # does not run. Wire them in explicitly or they never gate (CI does not
      # auto-discover package pytest).
      - name: pytest architect design-reviewer guards (RFC-0032)
        working-directory: packages/agentbundle
        run: >-
          python -m pytest
          agentbundle/build/tests/test_architect_design_reviewer_projection.py
          agentbundle/build/tests/test_architect_design_reviewer_rubric_parity.py

      # enriched-pack-manifest (RFC-0031): the manifest layer's contract +
      # construction tests live in the build/tests + tests/{unit,integration}
      # roots, which `make build-check` does not run. Wire them in explicitly or
      # they never gate (CI does not auto-discover package pytest) — the
      # projector mapping, the ≤5 cap, the soft-categories rail, the all-packs
      # enriched floor, and the @catalogue/pack identity invariant would
      # otherwise rot silently.
      - name: pytest enriched-pack-manifest (RFC-0031)
        working-directory: packages/agentbundle
        run: >-
          python -m pytest
          agentbundle/build/tests/test_projectable_subset.py
          agentbundle/build/tests/test_pack_schema.py
          agentbundle/build/tests/test_plugin_manifest_schema.py
          tests/unit/test_validate_categories.py
          tests/unit/test_enriched_pack_metadata.py
          tests/integration/test_list_packs_cmd.py

      - name: converters source-attribution scrub (AC2)
        run: |
          # rg exits 0 with hits, 1 with no matches, ≥2 on error
          # (invalid pattern, missing path, IO error). Explicitly
          # distinguish so an error-class exit fails CI rather than
          # silently passing as a no-match.
          [ -d packs/converters ] || { echo "::error::packs/converters/ missing"; exit 1; }
          rc=0
          out=$(rg -i --hidden '\bdropkit\b' packs/converters/) || rc=$?
          case "$rc" in
            0)
              first=$(printf '%s\n' "$out" | head -n1)
              echo "::error::source-catalogue attribution leak in packs/converters/: ${first}"
              exit 1 ;;
            1) ;;
            *)
              echo "::error::rg failed in scrub step (exit $rc)"
              exit 1 ;;
          esac

      - name: converters Rail-C marker scrub (AC3)
        run: |
          [ -d packs/converters ] || { echo "::error::packs/converters/ missing"; exit 1; }
          rc=0
          out=$(rg --hidden '<adapt:[A-Z_][A-Z0-9_]*>|<adapt:[a-z][a-z0-9-]*>' packs/converters/) || rc=$?
          case "$rc" in
            0)
              first=$(printf '%s\n' "$out" | head -n1)
              echo "::error::<adapt:...> marker found in packs/converters/ (user-scope packs forbid markers): ${first}"
              exit 1 ;;
            1) ;;
            *)
              echo "::error::rg failed in Rail-C step (exit $rc)"
              exit 1 ;;
          esac

      - name: converters evals.json carry-over disposition (AC4 + AC4a)
        run: |
          # Pin the spec's three-skill disposition mechanically:
          # file-to-markdown and markdown-to-html ship evals.json
          # (carried verbatim from source); msg-to-markdown must NOT
          # (spec § Never do: "No synthesised evals/evals.json for
          # msg-to-markdown"). Enumerated rather than glob-iterated so
          # a future skill addition can't silently change the contract.
          for skill in file-to-markdown markdown-to-html; do
            f="packs/converters/.apm/skills/${skill}/evals/evals.json"
            if [ ! -f "$f" ]; then
              echo "::error::AC4: ${f} missing (carry-over disposition)"
              exit 1
            fi
            python3 -c "import json, sys; p = sys.argv[1]; d = json.load(open(p)); assert 'skill_name' in d and 'evals' in d, f'{p} missing canonical keys'" "$f"
          done
          if [ -e packs/converters/.apm/skills/msg-to-markdown/evals ]; then
            echo "::error::AC4: msg-to-markdown/evals/ exists; spec forbids synthesised evals for this skill"
            exit 1
          fi

      - name: profiles lint + self-test (pack-profiles AC9)
        # RFC-0034: profiles must be scope-homogeneous, dependency-complete
        # (incl. version), and deps-first ordered. The self-test proves the
        # linter catches each crafted bad fixture; the lint then scans the
        # shipped profiles/ and fails the build on any real violation. Python,
        # invoked directly (not via bash), so the same step works on Windows.
        run: |
          python3 tools/test-lint-profiles.py
          python3 tools/lint-profiles.py --root .

      - name: design-craft framework-agnosticism lint + self-test (design-craft-pack AC8)
        # RFC-0033: the design-craft pack ships portable design method, never a
        # stack or a values table. The self-test proves the linter catches a
        # planted stack token / values-table shape; the lint then scans the
        # shipped pack and fails the build on any real leak. Python, invoked
        # directly (not via bash), so the same step works on the Windows runner.
        run: |
          python3 tools/test-lint-design-craft-agnostic.py
          python3 tools/lint-design-craft-agnostic.py

