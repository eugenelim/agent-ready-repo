name: build-check

# Self-hosting gate (Phase 1): runs `make build-check` against every PR
# targeting main. Refuses to merge if any Phase-1 *Projected* path on
# disk drifted from what the build pipeline emits. See
# docs/specs/self-hosting/spec.md § Phased rollout.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-check:
    name: make build-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run make build-check
        run: make build-check PACKS_DIR=packs

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install agentbundle (editable) + pytest
        run: pip install -e packages/agentbundle/ pytest

      - name: pytest converters install/uninstall (AC6a)
        working-directory: packages/agentbundle
        run: python -m pytest tests/integration/test_install_converters_user_scope.py

      - name: converters source-attribution scrub (AC2)
        run: |
          # rg exits 0 with hits, 1 with no matches, ≥2 on error
          # (invalid pattern, missing path, IO error). Explicitly
          # distinguish so an error-class exit fails CI rather than
          # silently passing as a no-match.
          [ -d packs/converters ] || { echo "::error::packs/converters/ missing"; exit 1; }
          rc=0
          out=$(rg -i --hidden '\bdropkit\b' packs/converters/) || rc=$?
          case "$rc" in
            0)
              first=$(printf '%s\n' "$out" | head -n1)
              echo "::error::source-catalogue attribution leak in packs/converters/: ${first}"
              exit 1 ;;
            1) ;;
            *)
              echo "::error::rg failed in scrub step (exit $rc)"
              exit 1 ;;
          esac

      - name: converters Rail-C marker scrub (AC3)
        run: |
          [ -d packs/converters ] || { echo "::error::packs/converters/ missing"; exit 1; }
          rc=0
          out=$(rg --hidden '<adapt:[A-Z_][A-Z0-9_]*>|<adapt:[a-z][a-z0-9-]*>' packs/converters/) || rc=$?
          case "$rc" in
            0)
              first=$(printf '%s\n' "$out" | head -n1)
              echo "::error::<adapt:...> marker found in packs/converters/ (user-scope packs forbid markers): ${first}"
              exit 1 ;;
            1) ;;
            *)
              echo "::error::rg failed in Rail-C step (exit $rc)"
              exit 1 ;;
          esac

      - name: converters evals.json carry-over disposition (AC4 + AC4a)
        run: |
          # Pin the spec's three-skill disposition mechanically:
          # file-to-markdown and markdown-to-html ship evals.json
          # (carried verbatim from source); msg-to-markdown must NOT
          # (spec § Never do: "No synthesised evals/evals.json for
          # msg-to-markdown"). Enumerated rather than glob-iterated so
          # a future skill addition can't silently change the contract.
          for skill in file-to-markdown markdown-to-html; do
            f="packs/converters/.apm/skills/${skill}/evals/evals.json"
            if [ ! -f "$f" ]; then
              echo "::error::AC4: ${f} missing (carry-over disposition)"
              exit 1
            fi
            python3 -c "import json, sys; p = sys.argv[1]; d = json.load(open(p)); assert 'skill_name' in d and 'evals' in d, f'{p} missing canonical keys'" "$f"
          done
          if [ -e packs/converters/.apm/skills/msg-to-markdown/evals ]; then
            echo "::error::AC4: msg-to-markdown/evals/ exists; spec forbids synthesised evals for this skill"
            exit 1
          fi

  # Native-Windows parity job for the Phase-3 bash→Python port (PR #71).
  # Runs the Python-portable subset of the Linux job: the bundler build
  # check, the converters install/uninstall integration test, the hook
  # smoke tests, and the pre-pr aggregator (which chains the five
  # artifact linters in the same order an adopter would run them).
  #
  # Deliberately omitted on Windows: the `sudo apt-get install ripgrep`
  # step, the two `rg`-based scrub steps (source-attribution, Rail-C
  # marker), and the `evals.json` carry-over step (its bash for-loop +
  # `[ -f ]` tests aren't portable as-is). Porting those is tracked as
  # follow-up PRs in the Windows-support action plan; keeping them
  # Linux-only here keeps this diff small and the Linux job untouched.
  #
  # `runs-on: windows-latest` runs PowerShell by default. Every command
  # below is a single-shot Python invocation, so the default shell is
  # fine — no `shell: bash` (which would force git-bash and re-introduce
  # the very portability problem this PR exists to verify away).
  build-check-windows:
    name: make build-check (windows)
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      # Force UTF-8 for stdio. Windows Python defaults to cp1252,
      # which can't encode the `✓`/`✖` glyphs the lint and pre-pr
      # scripts emit, nor decode their stderr when pytest reads it
      # via subprocess. PYTHONUTF8=1 enables Python 3.7+'s UTF-8
      # mode (text I/O default is UTF-8 regardless of locale);
      # PYTHONIOENCODING is a belt-and-braces for any path that
      # bypasses the UTF-8-mode default.
      # Adopter-side fix (scripts reconfiguring their own stdio so
      # this isn't needed in PowerShell either) is tracked as a
      # follow-up in the Windows-support action plan.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agentbundle (editable) + pytest
        # Installed first so `python -m agentbundle.build` resolves on
        # the Windows job, which doesn't go through `make` (the Linux
        # job's Makefile prepends packages/agentbundle to PYTHONPATH;
        # path-separator differences make replicating that fragile on
        # Windows, and `pip install -e` is needed for the pytest steps
        # below anyway).
        run: pip install -e packages/agentbundle/ pytest

      - name: Run bundler build (populates dist/ for build-check drift gates)
        # The drift gates added by docs/specs/claude-plugins-install-route/
        # (writer-template byte-identity vs canonical) cross-validate
        # source packs against the built dist/ tree. The Linux Makefile
        # target `build-check` depends on `build`; on Windows we mirror
        # that dependency explicitly so the gate doesn't fail loudly on
        # a missing dist/.
        run: python -m agentbundle.build build --packs-dir packs --output-dir dist

      - name: Run bundler build-check
        # Mirror of the Linux `make build-check` step — `make` shells to
        # `python3 -m agentbundle.build check`, and `python` is the safe
        # cross-platform invocation (Windows has no `python3` on PATH).
        run: python -m agentbundle.build check --packs-dir packs

      - name: pytest converters install/uninstall (AC6a)
        working-directory: packages/agentbundle
        run: python -m pytest tests/integration/test_install_converters_user_scope.py

      - name: pytest hook parity-net suite (windows-hooks-phase3)
        working-directory: packages/agentbundle
        run: python -m pytest tests/hooks/
        # The bash test_session_start.sh sibling is intentionally skipped
        # on Windows — pytest discovery only picks up test_*.py.

      - name: pre-pr aggregator (linters + spec termination check)
        # Same script adopters run locally; the canonical parity oracle.
        # Chains the artifact linters pre-pr.py invokes in order, then
        # loop-cohort per-spec checks. The exact linter set is owned by
        # pre-pr.py itself (PR #94 retired lint-skill-deps); list the
        # comment intentionally vague so this doesn't drift again.
        run: python tools/hooks/pre-pr.py

  tests-windows:
    name: pytest (windows-latest)
    # Windows-only verification home for the Credential Manager Tier-2
    # backend. The integration tests in
    # `packages/agentbundle/tests/integration/test_credman_windows.py`
    # and the unit tests in
    # `tests/unit/test_credman_windows_logic.py` are gated on
    # `sys.platform == "win32"`; without a windows-latest runner they
    # have nowhere automated to execute. macOS Keychain coverage runs
    # on the developer's machine and is tracked separately — this job
    # closes the Windows gap only (spec § AC10).
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agentbundle (editable) + pytest
        run: pip install -e packages/agentbundle/ pytest

      - name: pytest Windows Credential Manager + Tier-3 icacls (AC9–AC11, AC15)
        working-directory: packages/agentbundle
        run: |
          python -m pytest `
            tests/unit/test_credman_windows_logic.py `
            tests/unit/test_credentials_dotfile.py `
            tests/integration/test_credman_windows.py
