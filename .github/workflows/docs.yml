name: docs

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'LICENSE-MIT'
      - 'docs/**'
      - 'packages/**/AGENTS.md'
      - 'apps/**/AGENTS.md'
      - '.claude/**'
      - '.github/pull_request_template.md'
      - 'tools/lint-agents-md.py'
      - 'tools/lint-agent-artifacts.py'
      - 'tools/test-lint-agent-artifacts.sh'
      - 'tools/lint-skill-spec.py'
      - 'tools/test-lint-skill-spec.py'
      - 'packs/**/.apm/skills/**'
      - 'tools/lint-knowledge.py'
      - 'tools/test-lint-knowledge.sh'
      - 'tools/lint-catalogue-seeds.py'
      - 'tools/test-lint-catalogue-seeds.py'
      - 'profiles/**'
      - 'tools/lint-profiles.py'
      - 'tools/test-lint-profiles.py'
      - 'packs/**'
      - '.claude/skills/work-loop/scripts/loop-cohort.py'
      - 'packs/core/.apm/skills/work-loop/scripts/loop-cohort.py'
      - 'tools/test-loop-cohort.sh'
      - 'tools/hooks/**'
      - 'tools/test-all.py'
      - 'tools/test-pre-pr.sh'
      - 'tools/test-session-start.sh'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]

jobs:
  lint-agents-md:
    name: AGENTS.md hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AGENTS.md linter
        run: python tools/lint-agents-md.py

  lint-agent-artifacts:
    name: Agent-artifact hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools dependencies
        run: pip install -r tools/requirements.txt
      - name: Run agent-artifact linter
        run: python tools/lint-agent-artifacts.py
      - name: Self-test the linter (asserts expected errors fire)
        run: bash tools/test-lint-agent-artifacts.sh

  lint-skill-spec:
    name: agentskills.io spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools dependencies
        run: pip install -r tools/requirements.txt
      - name: Run skill-spec linter (projection + seeds)
        run: python tools/lint-skill-spec.py
      - name: Self-test the linter (every failure mode + happy path)
        run: python tools/test-lint-skill-spec.py

  lint-knowledge:
    name: Knowledge base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run knowledge-base linter
        run: python tools/lint-knowledge.py
      - name: Self-test the linter (schema-drift + content guards)
        run: bash tools/test-lint-knowledge.sh

  lint-catalogue-seeds:
    name: Seed scaffolds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run catalogue seed-content linter (RFC-0002 scaffold contract, opt-in per RFC-0047 D6)
        run: python tools/lint-catalogue-seeds.py
      - name: Self-test the linter (opt-in gate — flagged enforced, unflagged skipped)
        run: python tools/test-lint-catalogue-seeds.py

  lint-profiles:
    name: Install profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-test the linter (every failure mode + happy path)
        run: python tools/test-lint-profiles.py
      - name: Run profiles linter (scope/dep/order against the live packs/)
        run: python tools/lint-profiles.py --root .

  loop-cohort:
    name: Caps enforcer self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-test loop-cohort (caps, fingerprints, worktree verbs)
        run: bash tools/test-loop-cohort.sh

  # Aggregator end-to-end. Duplicates the per-layer linter jobs by design —
  # those each surface with their own check name in PR UI; this one catches
  # regressions in the catalogue gate's composition (a layer dropped, a reorder
  # breaking a dependency, exit-code propagation). Runs the repo-native
  # `tools/pre-pr-catalogue.py` (the 8 catalogue checks + the shipped pre-pr.py).
  hooks:
    name: Lifecycle hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools dependencies
        run: pip install -r tools/requirements.txt
      - name: Seed a healthy state.json so the aggregator exercises loop-cohort check
        run: |
          mkdir -p docs/specs/_ci-smoke
          sed 's/"pending"/"approved"/' .claude/skills/work-loop/assets/state.json \
            > docs/specs/_ci-smoke/state.json
      - name: Run pre-pr aggregator (mirrors local enforcement triplet)
        run: python tools/pre-pr-catalogue.py
      - name: Self-test the aggregator (each layer corruption surfaces)
        run: bash tools/test-pre-pr.sh
      - name: Self-test session-start (scope filter + malformed warning)
        run: bash tools/test-session-start.sh

  check-adr-immutability:
    name: ADRs are immutable
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect edits to existing accepted ADRs
        run: |
          # ADRs are immutable once accepted (status edits are allowed; body edits are not).
          # This is a heuristic: warn if any line outside the frontmatter changed
          # in a file that already had status `Accepted` on main.
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" -- 'docs/adr/*.md' || true)
          for f in $changed; do
            # skip new files
            if ! git cat-file -e "$base:$f" 2>/dev/null; then continue; fi
            # was it Accepted on base?
            if git show "$base:$f" | grep -q '^- \*\*Status:\*\* Accepted'; then
              # diff body lines (skip frontmatter changes — first 10 lines)
              body_diff=$(git diff "$base" "$head" -- "$f" | tail -n +12 | grep -E '^[+-]' | grep -vE '^\+\+\+|^---|Status:' || true)
              if [[ -n "$body_diff" ]]; then
                echo "::warning file=$f::This ADR was Accepted on base. Body edits are not allowed; supersede it with a new ADR instead. (Status-only edits are fine.)"
              fi
            fi
          done
          # Non-blocking: warns but always exits 0 — reviewers make the call.
