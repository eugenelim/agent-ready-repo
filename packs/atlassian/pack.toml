[pack]
name = "atlassian"
version = "0.6.1"
description = "Atlassian primitives: jira / jira-align / confluence-crawler (credentialed CLI), plus the flow-metrics, ai-adoption-report, jira-defect-flow, jira-brief-intake, jira-align-brief-intake, jira-story-triage, and jira-team-status workflows that compose them."
readme = "README.md"
display_name = "Atlassian"
license = "Apache-2.0 OR MIT"
categories = ["integrations", "project-management"]
keywords = ["jira", "confluence", "flow-metrics", "jira-align"]

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. Declared order also drives the
# greenfield fallback (claude-code matches DEFAULT_USER_SCOPE_ADAPTER).
# `kiro-ide` is the current name for the Kiro harness (RFC-0022 split;
# bare `kiro` deprecated). copilot + cursor + gemini added by RFC-0013 § Errata
# (2026-06-12): the full-parity adapters are admitted for credentialed CLIs
# now that both declare `.agentbundle/` in `allowed-prefixes.user` (the
# § 4d precondition); the consumer skills resolve the broker from
# `~/.agentbundle/bin/`. Append-only (RFC-0011 declared-order).
allowed-adapters = ["claude-code", "kiro-ide", "codex", "copilot", "cursor", "gemini"]

# pack-activation-evals (RFC-0037 / ADR-0028) — pack-eval-coverage-rollout:
# the Tier-A activation-eval coverage allowlist. Each listed skill ships
# evals/eval_queries.json and is measured by tools/run-pack-evals.py.
# Activation is observed at the Skill-router level before the skill body runs,
# so the credentialed CLI / backend login is irrelevant to whether the skill
# fires — no Atlassian credentials are needed to measure these (Tier-A only;
# behavior testing of a backend skill is future-Tier-B-RFC scope, see the spec).
[pack.evals]
skills = ["jira", "jira-align", "jira-brief-intake", "jira-align-brief-intake", "jira-defect-flow", "flow-metrics", "confluence-crawler", "confluence-publisher", "ai-adoption-report", "jira-story-triage", "jira-team-status"]

# enriched-pack-manifest (RFC-0031 / ADR-0021): catalogue-facing links
# + maintainer, including the `documentation` link to the per-pack guide home.
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/atlassian/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: mixed audience (developers + PMs); Atlassian credential requirement warrants a first-run prompt.
[pack.first-value]
audience-posture = "mixed"
surfaces         = ["claude-code"]
prerequisites    = ["Atlassian API token or SSO credentials via the credential-brokers pack"]
verification     = "Ask the agent 'List my open Jira issues' and confirm it returns results without an authentication error."
recovery         = "If authentication fails, run the credential-brokers setup to configure your Atlassian API token; if your org uses SSO, run the sso-broker flow first."
level-b          = true
starter-task     = "See your open Jira issues without opening a browser"
starter-prompt   = "Show me the Jira issues currently assigned to me that are open or in progress."
expected-result  = "A formatted list of your assigned Jira issues with status, priority, and issue keys."
next-action      = "Ask the agent to draft a comment updating the status of your most urgent issue."
