[pack]
name = "atlassian"
version = "0.1.0"
description = "Atlassian primitives: jira / jira-align / confluence-crawler (credentialed CLI), plus the flow-metrics, ai-adoption-report, and jira-defect-flow workflows that compose them."

[pack.adapter-contract]
version = "0.6"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. Declared order also drives the
# greenfield fallback (claude-code matches DEFAULT_USER_SCOPE_ADAPTER).
allowed-adapters = ["claude-code", "kiro", "codex"]
