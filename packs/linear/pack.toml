[pack]
name = "linear"
version = "0.1.1"
description = "Linear primitives: linear (credentialed GraphQL CLI), plus the linear-brief-intake and linear-brief-sync workflows that compose it with receive-brief."
readme = "README.md"
display_name = "Linear"
license = "Apache-2.0 OR MIT"
categories = ["integrations", "project-management"]
keywords = ["linear", "brief", "intake", "sync"]

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. Declared order also drives the
# greenfield fallback (claude-code matches DEFAULT_USER_SCOPE_ADAPTER).
# Admitted adapters match the atlassian/figma precedent for user-scope
# credentialed packs that declare `.agentbundle/` in `allowed-prefixes.user`.
# Append-only (RFC-0011 declared-order).
allowed-adapters = ["claude-code", "kiro-ide", "codex", "copilot", "cursor", "gemini"]

# enriched-pack-manifest (RFC-0031 / ADR-0021)
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/linear/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: mixed audience (developers + PMs); requires Linear Personal API Key for first run.
[pack.first-value]
audience-posture = "mixed"
surfaces         = ["claude-code"]
prerequisites    = ["Linear Personal API Key — configure via the credential-brokers pack"]
verification     = "Run `linear check` to confirm your credentials are working and your workspace is accessible."
recovery         = "If authentication fails, reconfigure your Linear API key via the credential-brokers pack; verify the key has read access to the correct Linear workspace."
level-b          = true
starter-task     = "Check your Linear credentials and see your open issues"
starter-prompt   = "Run linear check to confirm my credentials, then show me the open issues assigned to me in Linear."
expected-result  = "Confirmation that your Linear credentials are valid, followed by a list of your open assigned issues."
next-action      = "Ask the agent to run linear-brief-intake on one of the issues to convert it into a product brief."
