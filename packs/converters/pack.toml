[pack]
name = "converters"
version = "0.9.2"
description = "File-format conversion skills: documents and images → Markdown; Markdown → styled HTML and to branded Word, PowerPoint, and Excel; Outlook .msg and MIME .eml email → Markdown."
readme = "README.md"
display_name = "Converters"
license = "Apache-2.0 OR MIT"
categories = ["file-conversion", "documentation"]
keywords = ["markdown", "html", "msg", "pdf", "office"]

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. `kiro-ide` is the current name for
# the Kiro harness (RFC-0022 split; bare `kiro` deprecated). copilot +
# cursor added by RFC-0013 § Errata (2026-06-12): the full-parity adapters
# are admitted for credentialed CLIs now that both declare `.agentbundle/`
# in `allowed-prefixes.user` (the § 4d precondition). Append-only.
allowed-adapters = ["claude-code", "kiro-ide", "codex", "copilot", "cursor", "gemini"]

# pack-activation-evals (RFC-0037 / ADR-0028): the Tier-A activation-eval
# coverage allowlist (each listed skill ships evals/eval_queries.json, measured
# by tools/run-pack-evals.py). `msg-to-markdown` is excluded — it ships no
# evals/ at all (the converters evals.json carry-over gate hard-errors if
# msg-to-markdown/evals exists), so it stays without an eval_queries.json too.
[pack.evals]
skills = ["markdown-to-docx", "markdown-to-pptx", "markdown-to-xlsx", "markdown-to-html", "file-to-markdown", "mermaid-renderer"]

# enriched-pack-manifest (RFC-0031 / ADR-0021): catalogue-facing links
# + maintainer, including the `documentation` link to the per-pack guide home.
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/converters/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: mixed audience (content authors + developers); document-conversion value is immediately tangible for non-technical users.
[pack.first-value]
audience-posture = "mixed"
surfaces         = ["claude-code"]
prerequisites    = []
verification     = "Ask the agent to convert README.md to a Word document; confirm a README.docx file is created."
recovery         = "If the conversion fails, check that the source file exists and is a supported format; try converting a simpler file first."
level-b          = true
starter-task     = "Export this project's README as a shareable Word document"
starter-prompt   = "Convert README.md in this project to a Word document and save it as README.docx."
expected-result  = "A README.docx file in the project root with the README content formatted as a Word document."
next-action      = "Share README.docx with a teammate who does not use GitHub, or submit it as project documentation."
