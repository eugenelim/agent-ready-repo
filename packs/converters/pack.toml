[pack]
name = "converters"
version = "0.1.0"
description = "File-format conversion skills: documents and images → Markdown; Markdown → styled HTML; Outlook .msg → Markdown."

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. `kiro-ide` is the current name for
# the Kiro harness (RFC-0022 split; bare `kiro` deprecated).
allowed-adapters = ["claude-code", "kiro-ide", "codex"]
