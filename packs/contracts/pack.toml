[pack]
name = "contracts"
version = "0.3.0"
description = "Contract-authoring skills: OpenAPI 3.1 (api-contract) and AsyncAPI events (event-contract). User-scope default — contract style is portable across projects."

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. `kiro-ide` is the current name for
# the Kiro harness (RFC-0022 split; bare `kiro` deprecated).
allowed-adapters = ["claude-code", "kiro-ide", "codex"]
