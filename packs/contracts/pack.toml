[pack]
name = "contracts"
version = "0.1.0"
description = "Contract-authoring skills: OpenAPI 3.1 (api-contract) and more to come. User-scope default — contract style is portable across projects."

[pack.adapter-contract]
version = "0.6"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters.
allowed-adapters = ["claude-code", "kiro", "codex"]
