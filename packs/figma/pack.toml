[pack]
name = "figma"
version = "0.1.5"
description = "Figma REST API primitive (credentialed CLI). Reads files / nodes / metadata / versions / comments / variables / dev resources, renders frame images, posts comments, and converts FigJam connector graphs to Mermaid."
readme = "README.md"
display_name = "Figma"
license = "Apache-2.0 OR MIT"
categories = ["integrations", "file-conversion"]
keywords = ["figma", "figjam", "rest-api", "mermaid"]

[pack.adapter-contract]
version = "0.8"

[pack.install]
default-scope = "user"
allowed-scopes = ["user", "repo"]
# RFC-0011 / pack-allowed-adapters. `kiro-ide` is the current name for
# the Kiro harness (RFC-0022 split; bare `kiro` deprecated). copilot +
# cursor added by RFC-0013 § Errata (2026-06-12): the full-parity adapters
# are admitted for credentialed CLIs now that both declare `.agentbundle/`
# in `allowed-prefixes.user` (the § 4d precondition). Append-only.
allowed-adapters = ["claude-code", "kiro-ide", "codex", "copilot", "cursor", "gemini"]

# pack-activation-evals (RFC-0037 / ADR-0028) — pack-eval-coverage-rollout:
# the Tier-A activation-eval coverage allowlist. The skill ships
# evals/eval_queries.json and is measured by tools/run-pack-evals.py.
# Activation is observed at the Skill-router level before the skill body
# runs, so no Figma credentials are needed to measure it.
[pack.evals]
skills = ["figma"]

# enriched-pack-manifest (RFC-0031 / ADR-0021): catalogue-facing links
# + maintainer, including the `documentation` link to the per-pack guide home.
[pack.links]
homepage = "https://github.com/eugenelim/agent-ready-repo"
repository = "https://github.com/eugenelim/agent-ready-repo"
documentation = "https://github.com/eugenelim/agent-ready-repo/tree/main/docs/guides/figma/"

[[pack.maintainers]]
name = "eugenelim"
email = "eugenelim@users.noreply.github.com"

# Level B: non-technical audience (designers); Figma credential requirement warrants guided first-run prompting.
[pack.first-value]
audience-posture = "non-technical"
surfaces         = ["claude-code"]
prerequisites    = ["Figma personal access token via the credential-brokers pack", "Access to a Figma file with at least view permission"]
verification     = "Ask the agent 'List the files in my Figma workspace' and confirm it returns file names without an authentication error."
recovery         = "If authentication fails, regenerate your Figma token at figma.com/settings, update it in the credential broker, and retry."
level-b          = true
starter-task     = "Read the contents of a Figma file you have access to"
starter-prompt   = "Read the file structure of my main design file in Figma and list the page names and top-level frame names."
expected-result  = "A list of pages and top-level frames from your Figma file, showing the design's navigation structure."
next-action      = "Ask the agent to export a specific frame as a Markdown description to use in a spec or doc."
