# Credentials schema for the confluence-crawler credentialed primitive.
# Format: a [namespace] table plus one [[namespace.keys]] entry per key.
#
# Resolution: load_credentials("confluence", required_keys=[...]) walks
# Tier 1 (env) → Tier 2 (OS keyring) → Tier 3 dotfile. Env-var
# shape is <NAMESPACE>_<KEY> — CONFLUENCE_BASE_URL, CONFLUENCE_EMAIL,
# CONFLUENCE_API_TOKEN, CONFLUENCE_FLAVOR.
#
# BASE_URL and API_TOKEN are required for any operation. EMAIL is
# required only for Atlassian Cloud (used as the Basic-auth username
# alongside the token). FLAVOR is optional — the client auto-detects
# cloud vs server from the URL host.

[namespace]
name = "confluence"

[[namespace.keys]]
name = "BASE_URL"
label = "Confluence base URL (Cloud: https://<site>.atlassian.net/wiki; Server: https://confluence.corp.example.com)"
secret = false

[[namespace.keys]]
name = "EMAIL"
label = "Atlassian account email (Cloud only — used as Basic auth username)"
secret = false

[[namespace.keys]]
name = "API_TOKEN"
label = "Cloud API token (id.atlassian.com → API tokens) or Server Personal Access Token"
secret = true

[[namespace.keys]]
name = "FLAVOR"
label = "Optional: cloud or server (auto-detected from URL by default)"
secret = false
