# Credentials schema for the example-credentialed-skill worked example.
# Format pinned by skill-secrets spec § AC24:
#   [namespace] name = "<namespace>"
#   [[namespace.keys]] name, label, secret
#
# Two keys — one required secret (`API_TOKEN`), one optional non-secret
# sibling (`BASE_URL`). Adopters writing a new credentialed primitive
# typically declare the same shape; the loader resolves each key
# through Tier 1 (env) → Tier 2 (keyring) → Tier 3 (dotfile) per AC4.

[namespace]
name = "example"

[[namespace.keys]]
name = "API_TOKEN"
label = "Example API token"
secret = true

[[namespace.keys]]
name = "BASE_URL"
label = "Example instance base URL"
secret = false
