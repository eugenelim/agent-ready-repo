# workspace.toml — declared-intent coordination artifact.
# Queue entries are strings (no deps) or inline objects {path/slug, needs?, source?, summary?, type?}.
# `needs` uses queue-prefix notation:
#   "work:<path>"      — depends on a work queue entry (satisfied when shipped)
#   "shape:<slug>"     — depends on a shaping queue entry
#   "research:<slug>"  — depends on a research shaping entry
#   "brief:<path>"     — depends on a brief queue entry
#   "backlog:<slug>"   — depends on a repo-level [backlog] item
# Cross-initiative deps prefix the initiative slug: "ini-002:work:spec/..."
#
# Note: [backlog] (repo-durable open work, not scoped to any initiative) is distinct
# from [ini-NNN.shaping_queue].backlog (per-initiative non-active tier).

