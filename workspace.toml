# ─────────────────────────────────────────────────────────────────────────────
# ini-004 · AgentBundle Enterprise Distribution
#
# Makes agentbundle viable in corporate/enterprise environments by closing four
# interconnected gaps: source provenance (PackState), observability (JSON status
# output), operations (bulk upgrade with adapter-row granularity), and distribution
# infrastructure (HTTPS catalogue channels, organization bootstrap, catalogue
# packaging, and corporate update documentation).
#
# Non-goals (do not implement in this initiative): full hosted registry, registry
# search/publication APIs, dependency solver, pack@version selectors, upgrade --to/
# --latest, multiple named user registries, background update daemon, cross-scope
# transaction, cross-pack rollback, Artifactory AQL-based discovery, sorting
# filenames to infer latest release. Runtime remains Python 3.11 stdlib-only.
#
# ADR decisions required before code starts (resolved in the RFC gate):
#   1. Mutable channel descriptor pointing to an immutable versioned archive.
#   2. Package-shipped organization bootstrap configuration.
#   3. Source identity as part of pack ownership at a scope.
#   4. Bulk upgrade: preflighted but not transactionally atomic.
#
# Backlog connections:
#   - multi-adapter-state-lock-uninstall-upgrade: bulk upgrade touches the upgrade
#     command extensively; the uninstall/upgrade state-write concurrency gap stays
#     a separate backlog item — note it explicitly in spec/upgrade-bulk-all scope.
#   - upgrade-orphan-removal-on-projection-shape-change: bulk upgrade may trigger
#     projection shape changes; orphan removal stays a separate backlog item.
#   - convenient-install-defaults-followons: SHA-256 verification introduced here
#     closes the integrity concern for catalogue+https / archive+https sources;
#     git+https integrity pinning remains open.
#   - artifactory-first-publish-gesture: becomes actionable once ini-004 ships
#     (packaging infrastructure exists; first upload still needs GitHub secrets).
# ─────────────────────────────────────────────────────────────────────────────
["ini-004"]
