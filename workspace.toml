  # ── M1a · PackState Source Provenance ────────────────────────────────────────
  # "spec/packstate-source-provenance" — shipped; moved to ["ini-004".work].shipped

  # ── M1b · Source Conflict Install Guard ──────────────────────────────────────
  # Problem: the same pack name can be installed at one scope from multiple sources
  #   across different adapter rows, creating unresolvable provenance ambiguity that
  #   silently corrupts upgrade routing and status reporting.
  # Deliver: pre-install scan of all adapter rows for the same pack name at the target
  #   scope; refusal when canonical sources differ (concrete vs. concrete, or concrete
  #   vs. legacy/unknown); --force does not bypass a source mismatch; refusal fires before
  #   any projection write, hook, state write, or other mutation; error message identifies
  #   existing adapters and their sources; same-scope, same-source, multi-adapter install
  #   remains allowed; cross-scope (repo vs. user) same-pack from different sources is not
  #   blocked (status may warn).
  # Done: second-source install is refused before any mutation; same-source multi-adapter
  #   install is not falsely rejected; --force bypass is confirmed non-functional.
  # "spec/source-conflict-install-guard" — active; moved to ["ini-004".work].active

  # ── M2 · Update Status + JSON Output ─────────────────────────────────────────
  # Problem: list-installed produces a human table only, with no machine-readable
  #   output and no accurate update-status semantics. It does not distinguish "ahead"
  #   from "up-to-date," gives no actionable reason for "unknown" rows, and assumes
  #   every installed pack comes from one source.
  # Deliver: --format table|json flag (table default); status values up-to-date /
  #   upgrade-available / ahead / unknown; unknown with machine-readable reason codes
  #   (source-unavailable, source-unknown, pack-not-found, unparseable-*-version,
  #   incompatible-contract, adapter-no-longer-supported, malformed-catalogue);
  #   --updates-only filter (includes upgrade-available, ahead, unknown; excludes
  #   up-to-date only); multiple-source grouping (resolve each source once per
  #   invocation; one source failure does not hide rows from other sources); stable
  #   JSON contract (schema_version 1, sources array, rows with status_reason, summary);
  #   credential-redacted source strings; diagnostics to stderr; no state mutation.
  # Done: JSON stdout parses cleanly; ahead is never misreported as up-to-date; all
  #   unknown reasons are covered by tests; adapter-specific installed versions remain
  #   independent.
  # "spec/list-installed-update-status" — active; moved to ["ini-004".work].active

  # ── M3 · Bulk Upgrade (--all) ─────────────────────────────────────────────────
  # Problem: upgrade requires a single named pack; there is no way to upgrade all
  #   installed packs in one scoped operation, and multiple adapter rows for one pack
  #   do not independently track their upgrade state.
  # Deliver: --pack <name> | --all (mutually exclusive, one required); --scope required
  #   for --all (no --scope all, no inferred dual scope); adapter-row model (each (pack,
  #   adapter) pair is an independent upgrade row); preflight before all writes (resolve
  #   sources, compare versions, check manifests, render projections, path-jail, classify
  #   all rows); blocked rows (unknown / source error / manifest error) prevent all writes;
  #   deterministic apply order (canonical source → pack → adapter); stop-on-first-failure
  #   with completed/failed/not-attempted outcome tracking; --yes required for noninteractive
  #   JSON mutation; combined JSON contract (schema_version 1, rows with outcome field,
  #   summary); co-owned adapter paths retain existing safety classification.
  #   Explicitly out-of-scope: multi-adapter-state-lock-uninstall-upgrade concurrency gap
  #   (stays separate backlog item); upgrade-orphan-removal (stays separate backlog item).
  # Done: no silent downgrade of ahead rows; blocked plan writes nothing; partial failure
  #   is honestly reported and not described as rolled back; JSON output is valid on success,
  #   blocked preflight, and partial failure.
  # "spec/upgrade-bulk-all" — shipped; moved to ["ini-004".work].shipped

  # ── M4a · HTTPS Catalogue Channels ───────────────────────────────────────────
  # Problem: agentbundle only resolves catalogues from local directories or git+https
  #   archives. Enterprise environments need a channel-descriptor pattern (mutable
  #   stable.json → immutable versioned archive) with SHA-256 verification, bearer token
  #   auth, and safety limits on download and extraction. The mechanism must be vendor-
  #   neutral, not Artifactory-specific.
  # Deliver: catalogue+https and archive+https source schemes; channel descriptor schema
  #   v1 (schema, kind, bundle, channel, release, artifact, sha256 required; published_at,
  #   source_revision, minimum_agentbundle_version optional); SHA-256 verified before
  #   extraction; bearer token via AGENTBUNDLE_HTTP_BEARER_TOKEN (not persisted, not
  #   printed, not forwarded across host redirects); named safety limits (descriptor 1 MiB,
  #   archive 256 MiB, members 20k, expanded 1 GiB, finite HTTP timeout); path-traversal,
  #   absolute-path, symlink/hard-link, and special-file rejection; logical source identity
  #   (channel URI, not temporary extraction path); cross-origin and HTTP artifact URLs
  #   refused; local in-process HTTP server fixture for tests (no external network calls).
  # Done: digest mismatch fails before any install mutation; temp files cleaned on failure;
  #   client version checked against minimum_agentbundle_version before archive download.
  # "spec/https-catalogue-channels" — shipped; moved to ["ini-004".work].shipped

  # ── M4b · Organization Artifactory Bootstrap ──────────────────────────────────
  # Problem: there is no way for an organization's AgentBundle fork to ship a default
  #   internal catalogue source so developers receive the correct channel without manual
  #   configuration — and without the configuration being stored outside the vetted fork.
  # Deliver: optional [organization.artifactory] block in agentbundle/_data/install-
  #   defaults.toml (enabled, base-url, repository, bundle, channel); constructed source
  #   catalogue+<base-url>/<repository>/catalogues/<bundle>/channels/<channel>.json;
  #   documented five-level source precedence (explicit arg → user-configured → org
  #   bootstrap → editable-clone → packaged fallback); HTTPS-only, no-credentials
  #   validation; safe path-segment grammar for repository/bundle/channel; fail-closed
  #   on a malformed enabled config (no silent fallback to public source); public default
  #   ships enabled = false; all tests and docs use example.test placeholders only.
  # Done: a fork with enabled = true routes to the configured Artifactory channel after
  #   user config but before editable-clone; a malformed enabled config fails with a
  #   clear diagnostic and no fallback; no real org endpoints appear in the public repo.
  # "spec/organization-artifactory-bootstrap" — shipped; moved to ["ini-004".work].shipped

  # ── M5a · Package-Catalogue Command ──────────────────────────────────────────
  # Problem: there is no tooling to produce the expected Artifactory artifact layout
  #   (immutable release archive + mutable channel descriptor JSON) from the catalogue
  #   repository, making CI publishing a manual multi-step operation prone to layout
  #   errors and non-deterministic archives.
