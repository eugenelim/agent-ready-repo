# workspace.toml
#
# Declared-intent coordination artifact for this repo.
# Each initiative gets its own named section. Skills read this file at session
# start to orient to the current queue state — run `workspace-status` to surface
# ready items, blocked items, and active signals.
#
# Queue entries are strings (no dependencies) or inline objects {path/slug, needs}
# (with dependencies). `needs` uses queue-prefix notation:
#   "work:<path>"      — depends on a work queue entry
#   "shape:<slug>"     — depends on a shaping queue entry
#   "research:<slug>"  — depends on a research entry
#   "brief:<path>"     — depends on a brief queue entry
#   "backlog:<slug>"   — depends on a repo-level [backlog] item
# Cross-initiative deps prefix the initiative slug: "ini-002:work:spec/..."
#
# shaping_queue entry types: shape | research | strategy | signal | design
#   shape    → frame-intent (or frame-situation when PE pack is available)
#   research → desk-research-project-start (requires desk-research pack)
#   strategy → frame-situation (PE pack — M2); interim: frame-intent
#   signal   → no action; surfaces in "active context" section only
#   design   → experience-status (requires experience-design pack); fallback: journey-mapping
#
# Note: the top-level [backlog] section (repo-durable — open work not scoped to
# an active initiative) is distinct from a shaping_queue's `backlog` array (its
# non-active tier).

["ini-002"]
name      = "Platform Core"
status    = "active"
milestone = "M1 · Workspace Foundation"
parent    = "INI-001"

["ini-002".shaping_queue]
active  = []
backlog = [
  # Signal items — hand-authored by strategist; ongoing, non-graduating
  {slug = "ai-native-regulatory-watch", type = "signal"},
  # Research items — any user with the desk-research pack can pick these up
  {slug = "adopter-persona",            type = "research"},
  # Research (RFC-0064 M3 AC): should rfc-candidates.md graduate into the
  # shaping_queue (as research/strategy entries) rather than remain a separate
  # findings register? Assess the whole intake taxonomy — findings registers
  # (rfc-candidates, roadmap-intents) vs the new repo-level [backlog] vs the
  # shaping_queue. Owner intuition: rfc-candidates are "things we should work
  # through" and belong in shaping. Deliverable: a recommendation (keep separate
  # / fold / hybrid) feeding a possible RFC-0064 follow-on. Requires desk-research.
  {slug = "intake-taxonomy-rfc-candidates-to-shaping", type = "research"},
  # Shaping items — PE picks up when upstream research is done
  "ini-002-initiative-brief",
  {slug = "opp-assessment-pe-pack",  needs = "work:spec/m2-frame-situation"},
  {slug = "capability-map-ini-002",  needs = "work:spec/m2-map-capabilities"},
]

["ini-002".brief_queue]
executing = ""
ready     = []
draft     = []

["ini-002".work]
active  = []
shipped = [
  "spec/m1-workspace-core",      # Batch 2
  "spec/m1-work-queue",          # Batch 3
  "spec/m1-brief-queue",         # Batch 4
  "spec/m1-governance-integration", # Batch 5
  "spec/spec-A-workspace-status-rename", # RFC-0067 Change A
  "spec/new-rfc-followon-queue-write",
  "spec/queue-add",              # PR #566
  "spec/work-loop-queue-shipped-fix", # Fix done-step + stale-queue warning + line-177 path bug
  "spec/spec-D-pack-workflow-guide",  # Pack workflow design guide + CONTRIBUTING step 0
  "spec/spec-B-pack-status-skills",  # RFC-0067 Change B: desk-research-project-status + experience-status + design type
  "spec/rfc-0064-errata-workspace-integrity", # Amendment to RFC-0064 documenting session-fragmentation gap
  "spec/workspace-status-next-actions", # Add ### 6. Next-actions closing step to workspace-status
  "spec/workspace-status-queue-reconciliation", # PR #573 — reconciliation step
]
queue   = [
  # ==================================================================
  # RFC-0064 remaining work, sequenced by JOURNEY PHASE (see RFC-0064
  # Amendment #3). Phase order = PRIORITY (pick up P1 first), NOT a hard
  # dependency — `needs` encodes only real "cannot start until" edges. Each
  # phase is a per-repo Project (docs/product/projects/<slug>.md, 3–8 wks)
  # that ships its tooling AND its guides together; guides ride with the
  # capability they document — no terminal doc wave. Sub-RFC gates (P2, P4)
  # are noted in the phase header, not as entries (an RFC is not a spec).
  # Independent (non-RFC-0064) work is grouped at the bottom.
  # ==================================================================

  # ---------------- P1 · Orient + Capture ----------------
  # The universal entry point + the fix for build/shape misrouting. Mostly
  # built — cheapest complete slice. Ships as one Project.
  # Schema + governance: workspace.toml [backlog] + docs/backlog.md absorption.
  # Governed by RFC-0064 amendment 2026-07-20 ("Repo-level backlog & deferral
  # register") + M3 ACs. Problem: (1) no home for well-shaped ready-now work
  # below initiative scale; (2) open work split across docs/backlog.md, findings
  # registers, and per-initiative queues — no single view; (3) the deferral
  # habit needs a well-justified, visible gate. Fix (ONE coupled PR — see hazard):
  #   - Add [backlog].open handling to workspace-status (surface with the queues).
  #     (The header legend already documents the backlog:<slug> prefix and the
  #     top-level [backlog] vs shaping_queue.backlog distinction.)
  #   - Migrate all ~75 open items from docs/backlog.md into [backlog].open with
  #     cold-start-sufficient comments; deferred-AC items carry
  #     source = "spec/<name> ACn".
  #   - Relocate deferral: spec (deferred: <slug>) resolves to a [backlog].open
  #     entry (not a docs/backlog.md heading) + requires an inline justification;
  #     add an explicit work-loop "is this deferral justified?" prompt; rewrite
  #     lint-spec-status.py invariant (iv) in BOTH skill copies (.claude + .agents)
  #     AND the pack source.
  #   - Reduce docs/backlog.md to a ~15-line anchor-tombstone stub retaining ONLY
  #     the anchors linked by Frozen RFCs: RFC-0007
  #     #adapt-to-project--shipped-ac4b-transcripts-deferred, RFC-0023
  #     #credbroker-phase-2, RFC-0058 #extraction-tier0-and-output-contract,
  #     RFC-0065 #iac-terraform — each a one-line pointer to its [backlog] entry.
  #   - Repoint editable refs: CONTRIBUTING.md, new-spec template, work-loop,
  #     CONVENTIONS.md, export-catalogue.
  # HAZARD (why one PR): the (deferred:) lint is a HARD gate. Removing backlog.md
  # headings before the lint points at [backlog] dangles every existing
  # (deferred: <anchor>) marker → red CI. Section + migration + lint rewrite +
  # marker updates land atomically (or via a transitional dual-support lint).
  # Consolidated from the earlier Spec B + Spec C split for this reason.
  # Verify: full pytest for lint-spec-status (both test roots), make build-check
  # green, grep for no dangling backlog.md# anchors, workspace-status renders
  # [backlog]. Full-mode work-loop + adversarial-reviewer (HARD-gate + governance).
  "spec/m3-backlog-absorption",

  # capture-work front-door (Amendment #3 a/b/c). Rename queue-add → capture-work;
  # classify build vs shaping + subtype; WRITE shaping-typed entries (revises D9);
  # capability-detected core→pack hand-off (invoke frame-intent/frame-situation if
  # PE pack installed, else stamp entry + install hint); work-loop orient-step guard
  # (redirect shaping items — work-time backstop); [build]/[shape] mode tags in
  # workspace-status. Full consumer sweep (.apm/.agents/.claude triplicate + refs).
  # Needs [backlog] to carry modes first. Full-mode + adversarial (public-interface).
  {path = "spec/capture-work", needs = "work:spec/m3-backlog-absorption"},

  # P1 guides + plan-by-phase doctrine (Amendment #3 e/f). Guides (docs/guides/core/):
  # two-room build-vs-shape explanation, orient-at-session-start how-to, workspace-toml
  # schema reference. Doctrine: canonical phase-slice planning principle in CONVENTIONS,
  # referenced by new-rfc (add the roadmap-sequencing guidance it lacks — the gap that
  # produced this RFC's own terminal-M6 mistake) + receive-brief (extend "shippable
  # slice" to include its guide). Documents capture-work — lands after it.
  {path = "spec/workspace-journey-guides-and-planning-doctrine", needs = "work:spec/capture-work"},

  # ---------------- P2 · Shape (M2 PE skills) ----------------
  # GATE: open + accept RFC-00XX pe-pack-strategic-shaping FIRST — it resolves skill
  # boundaries (RFC-0064 M2 ACs + Known Unknowns). Each skill spec is authored after
  # that sub-RFC and ships WITH its guide (phase-slice doctrine — not all-skills-then-
  # all-guides). frame-situation + map-capabilities unblock the shaping_queue items
  # opp-assessment-pe-pack + capability-map-ini-002 (their `needs` already point here).
  "spec/m2-frame-situation",              # signal → typed finding → six-step route; Wardley maturity
  "spec/m2-identify-opportunities",       # JTBD (functional/emotional/social) + opportunity-assessment seed
  "spec/m2-diverge-solutions",            # step-3 ≥3 structured options; boundary w/ explore-options per sub-RFC
  "spec/m2-place-bet",                    # bet-commitment gate + betting-table surface
  "spec/m2-map-capabilities",             # product vision → all capability areas in one pass
  "spec/m2-frame-intent-jtbd",            # JTBD into shipped frame-intent; back-compat assessed in-spec
  "spec/m2-lean-canvas-and-initiative-brief", # Lean Canvas template + initiative brief (uses initiatives/_template)

  # ---------------- P3 · Brief → Build ----------------
  # Tooling already shipped (receive-brief, work-loop, brief queue). Docs only.
  "spec/author-brief-docs",               # how-to (intake-an-external-brief) + reference (DoR field defs)

  # ---------------- P4 · Intake edges (M5 trackers) ----------------
  # github-brief-intake first (independent, builds pattern confidence). GATE for the
  # rest: open + accept RFC-00XX linear-pack sub-RFC (delta model, AC-export scope,
  # field mapping). Each ships with its guide slice.
  "spec/m5-github-brief-intake",          # GitHub Issue/Milestone → brief with Epic: pointer
  "spec/m5-linear-brief-intake-and-sync", # first-time intake + delta sync; refuse when brief Executing
  "spec/m5-jira-align-brief-intake",      # atlassian pack; 1-way intake only, config-guided field map
  "spec/m5-tracker-guides",               # tracker decision tree + vocabulary mapping table

  # ---------------- P5 · Adopt (terminal — needs whole journey stable) ----------------
  "spec/m6-astro-project-index",          # Astro site: PM-facing project index from docs/product/projects/
  "spec/m6-role-journey-guides",          # PM / engineer / agent role journeys, from docs/product/journeys/
  "spec/m6-live-demo-guide",              # ≥3 team types; ≤30-min shaping→brief→spec narration on org's own repo
  "spec/m6-enterprise-rollout-playbook",  # champion→CTO→platform→engineers; staged rollout + retro template

  # ---------------- Independent track (not RFC-0064) ----------------
  {path = "spec/spec-C-workloop-argless-resume",        needs = "work:spec/spec-B-pack-status-skills"},
  "spec/catalogue-curation",
]

[backlog]
# Repo-durable open items not scoped to an active initiative. Surfaced by
# workspace-status alongside initiative queues. See spec/m3-backlog-absorption
# for the full schema and docs/backlog.md migration plan.
open = [
