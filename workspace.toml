  # Unblocks when: someone takes a SHA-pin sweep PR for all existing workflows.
  {slug = "github-actions-sha-pin", summary = "SHA-pin all GitHub Actions and retire the zizmor suppression", source = "spec/secret-scanner-for-api-key-workflows zizmor.yml Concern"},

