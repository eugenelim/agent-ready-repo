  #   --output required; --source-revision, --minimum-agentbundle-version, --published-at,
  #   SOURCE_DATE_EPOCH honored as optional); dist/artifactory layout (releases/<release>/
  #   + channels/); catalogue content allowlist (packs/, profiles/, docs/contracts/,
  #   README, LICENSE, catalogue-manifest.json — no .git/, build/, credentials, or
  #   untracked files); deterministic archive (sorted paths, normalized uid/gid/timestamps/
  #   modes, reproducible gzip, digest generated after final bytes); catalogue-manifest.json
  #   (schema, bundle, release, source_revision, generated_at, included files + SHA-256
  #   digests, pack names + versions); refuse overwrite of existing release archive by
  #   default; pre-package validation (valid packs/profiles, no unsafe symlinks,
  #   included paths remain inside catalogue root); no git shell-out.
  # Done: identical inputs + SOURCE_DATE_EPOCH produce byte-identical archives; archive
