# workspace.toml
#
# Declared-intent coordination artifact for this repo.
# Each initiative gets its own named section. Skills read this file at session
# start to orient to the current queue state — run `workspace-status` to surface
# ready items, blocked items, and active signals.
#
# Queue entries are strings (no dependencies) or inline objects {path/slug, needs}
# (with dependencies). `needs` uses queue-prefix notation:
#   "work:<path>"      — depends on a work queue entry
#   "shape:<slug>"     — depends on a shaping queue entry
#   "research:<slug>"  — depends on a research entry
#   "brief:<path>"     — depends on a brief queue entry
#   "backlog:<slug>"   — depends on a repo-level [backlog] item
# Cross-initiative deps prefix the initiative slug: "ini-002:work:spec/..."
#
# shaping_queue entry types: shape | research | strategy | signal | design
#   shape    → frame-intent (or frame-situation when PE pack is available)
#   research → desk-research-project-start (requires desk-research pack)
#   strategy → frame-situation (PE pack — M2); interim: frame-intent
#   signal   → no action; surfaces in "active context" section only
#   design   → experience-status (requires experience-design pack); fallback: journey-mapping
#
# Note: the top-level [backlog] section (repo-durable — open work not scoped to
# an active initiative) is distinct from a shaping_queue's `backlog` array (its
# non-active tier).

["ini-002"]
name      = "Platform Core"
status    = "active"
milestone = "M1 · Workspace Foundation"
parent    = "INI-001"

["ini-002".shaping_queue]
active  = []
backlog = [
  # Signal items — hand-authored by strategist; ongoing, non-graduating
  {slug = "ai-native-regulatory-watch", type = "signal"},
  # Research items — any user with the desk-research pack can pick these up
  # adopter-persona: deliverable must cover pack-segmented setup posture across the
  # proposed Level B set (architect, atlassian, converters, desk-research,
  # experience-design, figma, governance-extras, product-engineering,
  # product-strategy, user-guide-diataxis); include terminology comprehension,
  # prerequisite visibility, artifact discovery, and inputs to P5 persona and
  # live-demo design. Do not add a second generic user-study item — broaden this
  # one; formative evaluation folds into the pilots and later P5/rollout ACs.
  {slug = "adopter-persona",            type = "research"},
  # Research (RFC-0064 M3 AC): should rfc-candidates.md graduate into the
  # shaping_queue (as research/strategy entries) rather than remain a separate
  # findings register? Assess the whole intake taxonomy — findings registers
  # (rfc-candidates, roadmap-intents) vs the new repo-level [backlog] vs the
  # shaping_queue. Owner intuition: rfc-candidates are "things we should work
  # through" and belong in shaping. Deliverable: a recommendation (keep separate
  # / fold / hybrid) feeding a possible RFC-0064 follow-on. Requires desk-research.
  {slug = "intake-taxonomy-rfc-candidates-to-shaping", type = "research"},
  # Shaping items — PE picks up when upstream research is done
  "ini-002-initiative-brief",
  {slug = "opp-assessment-pe-pack",  needs = "work:spec/m2-frame-situation"},
  {slug = "capability-map-ini-002",  needs = "work:spec/m2-map-capabilities"},
  # Post-pilot rollout shaping — RFC-0064 Amendment #4 cross-pack overlay.
  # Deliverable after shaping: one appetite-bounded formal brief whose independently
  # shippable slices cover the remaining ratified Level B packs (beyond the three
  # pilots). Each pack slice includes its guide, surface evidence, safety boundary,
  # recovery, eval, and only necessary skill change. Must audit P2/P3/P4 guides and
  # existing tutorials before proposing work. Blocked until all three pilot work
  # items complete (evidence base for shaping).
  {slug = "nontechnical-pack-first-value-rollout", type = "shape", needs = ["work:spec/portfolio-first-run-pilot-architect", "work:spec/portfolio-first-run-pilot-figma", "work:spec/portfolio-first-run-pilot-governance-extras"]},
  # Portfolio outcome entry-surfaces — design (RFC-0064 Amendment #4). Deliverable
  # after shaping: a surface/flow brief for homepage, catalogue, pack pages, READMEs,
  # journeys, and docs routing that consumes the contract and routes by plain-language
  # outcome. Explicitly excludes site-social-proof-band, site-mobile-responsiveness,
  # site-design-system-spec, and P5's Astro project index; reference those owners.
  # Blocked until the contract is ratified and all three pilots complete.
  {slug = "portfolio-outcome-entry-surfaces", type = "design", needs = ["work:spec/portfolio-pack-first-value-contract", "work:spec/portfolio-first-run-pilot-architect", "work:spec/portfolio-first-run-pilot-figma", "work:spec/portfolio-first-run-pilot-governance-extras"]},
]

["ini-002".brief_queue]
executing = ""
ready     = []
draft     = []

["ini-002".work]
active  = [
  "spec/catalogue-curation",  # in progress — pending manual-QA live tests (assimilate-primitive, export-catalogue, assimilate-repo dry runs)
]
shipped = [
  "spec/m2-frame-situation",     # frame-situation PE skill
  "spec/m1-workspace-core",      # Batch 2
  "spec/m1-work-queue",          # Batch 3
  "spec/m1-brief-queue",         # Batch 4
  "spec/m1-governance-integration", # Batch 5
  "spec/spec-A-workspace-status-rename", # RFC-0067 Change A
  "spec/new-rfc-followon-queue-write",
  "spec/queue-add",              # PR #566
  "spec/work-loop-queue-shipped-fix", # Fix done-step + stale-queue warning + line-177 path bug
  "spec/spec-D-pack-workflow-guide",  # Pack workflow design guide + CONTRIBUTING step 0
  "spec/spec-B-pack-status-skills",  # RFC-0067 Change B: desk-research-project-status + experience-status + design type
  "spec/rfc-0064-errata-workspace-integrity", # Amendment to RFC-0064 documenting session-fragmentation gap
  "spec/workspace-status-next-actions", # Add ### 6. Next-actions closing step to workspace-status
  "spec/workspace-status-queue-reconciliation", # PR #573 — reconciliation step
  "spec/m3-backlog-absorption",                # Migrate docs/backlog.md → workspace.toml [backlog]
  "spec/capture-work",                         # Rename queue-add → capture-work; classify/triage + mode tags + work-loop guard
  "spec/spec-C-workloop-argless-resume",       # RFC-0067 Change C: argless resume + three-branch active-spec routing
  "spec/workspace-journey-guides-and-planning-doctrine", # RFC-0064 P1 Orient+Capture: 6 guides + phase-slice doctrine
  "spec/author-brief-docs",                   # RFC-0064 P3: how-to + DoR gate fields reference
  "spec/m2-diverge-solutions",                # diverge-solutions PE skill (step 3 of six-step shaping sequence)
  "spec/m2-lean-canvas-and-initiative-brief",  # lean-canvas PE skill + Lean Canvas initiative brief
  "spec/m2-place-bet",                         # place-bet PE skill + worked example + how-to guide
  "spec/m2-identify-opportunities",            # identify-opportunities PE skill + template + example + guide
  "spec/m2-map-capabilities",                  # map-capabilities PE skill + template + examples + how-to guide
  "spec/m2-frame-intent-jtbd",                 # PR #599 — JTBD three-tier elicitation into frame-intent; back-compat assessed in spec
]
queue   = [
  # ==================================================================
  # RFC-0064 remaining work, sequenced by JOURNEY PHASE (see RFC-0064
  # Amendment #3). Phase order = PRIORITY (pick up P1 first), NOT a hard
  # dependency — `needs` encodes only real "cannot start until" edges. Each
  # phase is a per-repo Project (docs/product/projects/<slug>.md, 3–8 wks)
  # that ships its tooling AND its guides together; guides ride with the
  # capability they document — no terminal doc wave. Sub-RFC gates (P2, P4)
  # are noted in the phase header, not as entries (an RFC is not a spec).
  # Independent (non-RFC-0064) work is grouped at the bottom.
  # ==================================================================

  # ---------------- P1 · Orient + Capture ----------------
  # P1 guides + plan-by-phase doctrine (Amendment #3 e/f). Guides (docs/guides/core/):
  # ---------------- P2 · Shape (M2 PE skills) ----------------
  # GATE: open + accept RFC-00XX pe-pack-strategic-shaping FIRST — it resolves skill
  # boundaries (RFC-0064 M2 ACs + Known Unknowns). Each skill spec is authored after
  # that sub-RFC and ships WITH its guide (phase-slice doctrine — not all-skills-then-
  # all-guides). frame-situation + map-capabilities unblock the shaping_queue items
  # opp-assessment-pe-pack + capability-map-ini-002 (their `needs` already point here).
  # "spec/m2-diverge-solutions" — shipped; moved to ["ini-002".work].shipped
  # "spec/m2-place-bet" — shipped; moved to ["ini-002".work].shipped
  # "spec/m2-map-capabilities" — shipped; moved to ["ini-002".work].shipped
  # "spec/m2-frame-intent-jtbd" — shipped; moved to ["ini-002".work].shipped

  # ---------------- P3 · Brief → Build ----------------
  # Tooling already shipped (receive-brief, work-loop, brief queue). Docs only.
  # spec/author-brief-docs shipped — moved to work.shipped above.

  # ---------------- P4 · Intake edges (M5 trackers) ----------------
  # github-brief-intake first (independent, builds pattern confidence). GATE for the
  # rest: open + accept RFC-00XX linear-pack sub-RFC (delta model, AC-export scope,
  # field mapping). Each ships with its guide slice.
  "spec/m5-github-brief-intake",          # GitHub Issue/Milestone → brief with Epic: pointer
  "spec/m5-linear-brief-intake-and-sync", # first-time intake + delta sync; refuse when brief Executing
  "spec/m5-jira-align-brief-intake",      # atlassian pack; 1-way intake only, config-guided field map
  "spec/m5-tracker-guides",               # tracker decision tree + vocabulary mapping table

  # ---------------- P5 · Adopt (terminal — needs whole journey stable) ----------------
  # Authoring gate: each P5 spec must consume the adopter-persona research findings
  # and the three pilot transcripts (portfolio-first-run-pilot-architect/figma/
  # governance-extras) as evidence base. Do not author P5 specs before those work
  # items complete — the evidence does not yet exist.
  "spec/m6-astro-project-index",          # Astro site: PM-facing project index from docs/product/projects/
  "spec/m6-role-journey-guides",          # PM / engineer / agent role journeys, from docs/product/journeys/
  "spec/m6-live-demo-guide",              # ≥3 team types; ≤30-min shaping→brief→spec narration on org's own repo
  "spec/m6-enterprise-rollout-playbook",  # champion→CTO→platform→engineers; staged rollout + retro template

  # ---- RFC-0064 Amendment #4: Cross-pack first-value overlay ----
  # Complements P1–P5 phases; may progress in parallel where dependencies allow;
  # feeds P5 adoption evidence. Group order = priority; `needs` encodes only the
  # hard "cannot start until" edges stated in Amendment #4.

  # Problem: pack audience, surface, install, verification, recovery, first-task,
  # artifact, tutorial, and next-action facts are distributed across pack metadata,
  # guides, journeys, README prose, and generated manifests without one maintained
  # ownership contract.
  # Deliver: ratified Level A/Level B obligations and membership; smallest
  # authoritative semantic record; all seventeen current packs migrated; schema/
  # parity validation; one real consumer and one independent parity proof.
  # Done: inventory reconciles; required fields and negative fixtures pass; one
  # source change propagates or fails every governed consumer; manifest validation
  # green.
  {path = "spec/portfolio-pack-first-value-contract"},

  # Problem: Architect is explicitly non-technical by setup posture, but portfolio
  # readiness is not proven by its existing tutorial or manifest alone
  # (local/no-credential archetype — simplest pilot risk profile).
  # Deliver: no-terminal, supported-surface path from architecture outcome to one
  # bounded concept/diagram/review artifact; install verification, exact starter
  # prompt, visible result, recovery, next action, cold-start transcript; only
  # evidence-led skill changes.
  # Done: fresh evaluator completes path without undocumented terminal/repo knowledge;
  # tutorial/contract/eval stay in parity.
  {path = "spec/portfolio-first-run-pilot-architect", needs = "work:spec/portfolio-pack-first-value-contract"},

  # Problem: credentialed non-technical pack needs proven prerequisite and read-only
  # first-value pattern; authentication failure must not be mistaken for user error
  # (credentialed read-only archetype).
  # Deliver: Figma token/service prereq disclosure, safe read-only first task against
  # synthetic/authorized data, artifact/decision visibility, exact recovery, dated
  # surface evidence. Reuse behavior-check-for-backend-skills and credential-broker
  # evidence; do not invent another cassette/backend harness.
  # Done: representative read path passes or surface is honestly graded Limited with
  # a reproducible blocker; no secret enters docs, prompts, fixtures, or transcripts.
  {path = "spec/portfolio-first-run-pilot-figma", needs = "work:spec/portfolio-pack-first-value-contract"},

  # Problem: repository-writing packs need a non-technical first run that explains
  # the decision and prevents an unexpected shared-state write (preview-confirm write
  # archetype).
  # Deliver: preview-confirm path to one bounded ADR/RFC artifact in a user-owned
  # repo; plain-language decision framing, target path/effect preview, confirmation,
  # recovery/resume, next action, cold-start evidence.
  # Done: evaluator can explain what will be written, where, why, and how to stop
  # or revise before confirmation.
  {path = "spec/portfolio-first-run-pilot-governance-extras", needs = "work:spec/portfolio-pack-first-value-contract"},

  # Problem: successful terminal installation can end in dense file-operation output
  # without pack-specific verification, expected first result, or a copy-ready next
  # prompt.
  # Deliver: consume the accepted contract in concise human-default install completion
  # output while preserving dry-run, detailed, and structured automation behavior.
  # Done: a successful install ends with pack-specific verification, expected first
  # result, and next prompt; automation snapshots and advanced modes remain compatible.
  # Graphical onboarding remains the Level B default.
  {path = "spec/agentbundle-first-value-handoff", needs = "work:spec/portfolio-pack-first-value-contract"},
]

# Repo-level backlog — open work not scoped to any active initiative.
# Populated by the m3-backlog-absorption migration (docs/specs/m3-backlog-absorption/).
# Entries are inline objects: {slug, needs?, source?} where:
#   slug   — unique identifier; matches any (deferred: <slug>) marker in specs
#   source — deferred-AC provenance, e.g. "spec/foo AC3"
#   needs  — same prefix notation as queue entries ("backlog:<slug>", "work:spec/...")
# Per-entry TOML comments must be cold-start-sufficient: problem, fix, file/skill, unblock.
# Distinct from [ini-NNN.shaping_queue].backlog (per-initiative non-active tier).
[backlog]
open = [
  # ── Quick wins ───────────────────────────────────────────────────────────────
  # (single focused session; no external environment; small diff)

  # The credential-brokers pack's shipped .apm/** carries RFC-0023/RFC-0006 citations
  # in credential-setup/scripts/setup.py and user-libs/credbroker/ (files:
  # __init__.py, _core.py, _vault.py). The pack is frozen by RFC-0013 (§4/§4d);
  # the apm-internal-ref-sweep cleaned core + figma but left this frozen pack.
  # Fix: a focused comment-only PR with explicit RFC-0013 approver sign-off, or fold
  #   into apm-leak-lint-rfc when that RFC lands.
  # Unblocks when: apm-leak-lint-rfc RFC is approved, or explicit approval obtained.
  {slug = "credbroker-frozen-pack-ref-sweep", source = "spec/apm-internal-ref-sweep"},

  # Security. Both markdown-to-html and render-proof load mermaid@11 from jsDelivr
  # with a floating major-range specifier and no integrity= hash. A CDN compromise
  # or MITM could inject arbitrary JS into the generated page's origin, bypassing
  # DOMPurify. Affects two script tags in each skill.
  # Fix: pin an exact patch version (mermaid@11.a.b) and add integrity="sha384-..."
  #   + crossorigin="anonymous" to both script tags, or vendor mermaid locally.
  # File: packs/converters/.apm/skills/markdown-to-html + render-proof (script tags).
  # Unblocks when: a specific Mermaid patch version is chosen and its SRI hash computed.
  {slug = "cdn-sri-mermaid", source = "spec/mermaid-rendering-improvements"},

  # RFC-0065 D5 (source-author review 2026-07-18). Azure shipped contract-complete
  # in iac-terraform v1 (four provider files + providers/azure.md) but no worked
  # example has passed terraform init -backend=false && fmt -check && validate. The
  # provider index entry is stamped "experimental — not validated in v1."
  # Fix: author examples/azure/ (match shape of examples/aws/ and examples/gcp/);
  #   run the three-command validation gate; remove the experimental stamp from
  #   providers/azure.md; bump the provider index entry to validated.
  # File: packs/core/.apm/skills/iac-terraform/ (examples/azure/ + providers/azure.md).
  # Unblocks when: Azure worked example is authored and passes the three-command gate.
  {slug = "iac-terraform-azure-validation"},

  # spec/product-brief-intake reviewer follow-on. The adopter-facing leak guard (no
  # agent-ready-repo / RFC-NNNN / catalogue-spec-name) is enforced by
  # tools/lint-catalogue-seeds.py for seed files only. The shipped receive-brief/
  # SKILL.md and examples/*.md live under packs/core/.apm/skills/ — outside the lint's
  # scope, clean by inspection but unguarded against regression.
  # Fix: extend tools/lint-agent-artifacts.py to cover shipped-skill bodies and
  #   examples/ under packs/core/.apm/skills/.
  # Unblocks when: someone extends the lint during a routine maintenance PR.
  {slug = "product-brief-intake-leak-guard"},

  # Platform site (web/). The site ships zero social proof or credibility signal —
  # no version/recency badge, no install count, no adopter logos, no dogfooding claim.
  # The strongest available honest signals: agentbundle PyPI version badge, install
  # count, "built with itself" dogfooding statement, adapter count.
  # Fix: add a proof-band section between the hero and loops sections in
  #   web/src/pages/index.astro; no formal spec needed — normal PR + experience-reviewer.
  # Unblocks when: someone decides what signal is available and honest to publish.
  {slug = "site-social-proof-band"},

  # Platform site mobile CSS covers the hero section only. Needs a full mobile audit:
  # cards grid on narrow viewports, navigation, code block overflow, table horizontal
  # scroll, tab-panel usability on touch. Test via Chrome DevTools device emulation
  # (375/390/430px) and a physical device. Dev server: make site-serve.
  # Fix: run the mobile audit; open a mobile-CSS PR.
  # Unblocks when: screened on actual mobile viewport + physical device.
  {slug = "site-mobile-responsiveness"},

  # tools/validate-claude-plugin-manifests.py runs in publish CI (publish-plugins.yml)
  # but not the normal local build-check path. A manifest contract failure that CI
  # would catch is invisible to a standard make build-check run.
  # Fix: wire the existing validator into the documented local preflight (e.g. a make
  #   target or a build-check step), or add a tested, documented exception if the
  #   parity difference is intentional. Reuse the validator; do not duplicate schema
  #   logic.
  # File: tools/validate-claude-plugin-manifests.py + Makefile (or build-check path).
  # Done: the normal local preflight catches the same manifest contract failure as
  #   publish CI, or the deliberate difference is executable and documented.
  {slug = "local-claude-manifest-validator-gate"},

  # docs/guides/desk-research/tutorials/desk-research-first-session.md line 15 says
  # `agentbundle install research --scope user` but the pack id is `desk-research`
  # (renamed in M3). Stale id fails silently for new adopters.
  # Fix: use the canonical `agentbundle install desk-research --scope user` install
  #   path; extend the owning docs/parity lint with a retired-id negative fixture.
  # File: docs/guides/desk-research/tutorials/desk-research-first-session.md:15.
  # Done: active content uses `desk-research`; the stale id fails the owning check.
  # Do not expand this item into a tutorial redesign.
  {slug = "desk-research-install-name-drift"},

  # ── High severity ────────────────────────────────────────────────────────────
  # (security findings or concretely broken behavior with a known internal fix path)

  # Security (HIGH). agentbundle install calls render_pack(pack_dir) with no
  # lint_pack gate. _collect_tree does path.read_bytes(), dereferencing inside-tree
  # symlinks. A malicious pack shipping .apm/skills/x/leak -> /etc/passwd writes the
  # target's bytes to the adopter's disk (path jail passes on the relpath). Affects
  # all four direct-directory adapters: claude-code, kiro, codex, copilot.
  # cursor.py was hardened (ignore=_ignore_symlinks) but the other four use
  # copytree(symlinks=True); on Python 3.11/3.12 a dirlink -> /etc recurses.
  # Fix: gate install-path render_pack with lint_pack (flags inside-tree symlinks
  #   at build/lint_packs.py), OR make _collect_tree skip symlinked entries via
  #   os.walk(followlinks=False) across all four adapters.
  # File: packages/agentbundle/agentbundle/render.py + install.py + adapter files.
  # Unblocks when: someone takes a spec scoping the cross-adapter hardening.
  {slug = "untrusted-catalogue-symlink-exfiltration"},

  # Security. cursor.py's _project_direct_directory was hardened to drop nested
  # symlinks (ignore=_ignore_symlinks), but kiro.py, codex, copilot, and claude-code
  # still use copytree(symlinks=True). A nested symlink inside a skill dir in a
  # malicious pack can be reproduced to an adopter's disk via those four adapters.
  # Fix: lift cursor's symlink-skipping copy helper into
  #   packages/agentbundle/agentbundle/projections/direct_directory.py and adopt it
  #   in all four remaining adapters.
  # Unblocks when: someone takes a focused cross-adapter hardening PR.
  {slug = "nested-symlink-install-hardening"},

  # CI security. spec/pack-activation-evals introduces the repo's first long-lived
  # API-key workflow secret (ANTHROPIC_API_KEY for pack-evals.yml). No secret scanner
  # is wired today (only CodeQL + Bandit/Semgrep). Adjacent gaps: actionlint + zizmor
  # Security. pack-evals.yml runs `npm install -g @anthropic-ai/claude-code@2.1.185`
  # in the same job that exposes ANTHROPIC_API_KEY. The install is version-pinned but
  # has no npm lockfile or per-package integrity hash — a compromised npm CDN or a
  # re-tagged release could deliver malicious JS that exfiltrates the API key.
  # Fix: research whether `npm install -g` supports `--integrity` or a lockfile
  #   approach; if not, vendor the tarball or use an alternative install path.
  # File: .github/workflows/pack-evals.yml
  # Unblocks when: a concrete path to npm global-install integrity verification is found.
  {slug = "pack-evals-npm-lockfile-integrity", source = "spec/secret-scanner-for-api-key-workflows AC Assumption 5"},

  # Security. All .github/workflows/*.yml use @vN tag pinning (e.g. actions/checkout@v4).
  # Tag pinning is a TOFU posture — a re-tagged release is not detected.
  # SHA pinning (actions/checkout@<sha>) is immune to tag mutation attacks.
  # zizmor's unpinned-uses audit (HIGH) is suppressed for existing workflows via
  # .github/zizmor.yml; SHA pinning retires that suppression.
  # Fix: pin each action to a commit SHA in each .github/workflows/*.yml;
  #   update zizmor.yml to remove per-file ignore once all actions are SHA-pinned.
  # Unblocks when: someone takes a SHA-pin sweep PR for all existing workflows.
  {slug = "github-actions-sha-pin", source = "spec/secret-scanner-for-api-key-workflows zizmor.yml Concern"},

  # spec/shared-prefix-aware-multi-adapter-install follow-on (reviewer Concern).
  # install routes state RMW through statelock.persist_state_locked (concurrency AC).
  # uninstall and upgrade write state via bare safety.write_jailed, so a concurrent
  # install + uninstall/upgrade can lose-update one writer's change.
  # Fix: route uninstall's row-drop and upgrade's version-bump through
  #   persist_state_locked with a mutate closure that re-derives against freshly-read
  #   state; add a multi-process stress test for statelock's stale-reclaim collision.
  # File: packages/agentbundle/agentbundle/commands/{uninstall,upgrade}.py + statelock.py.
  # Unblocks when: someone takes a concurrency hardening PR for uninstall/upgrade.
  {slug = "multi-adapter-state-lock-uninstall-upgrade"},

  # agentbundle upgrade re-renders the new projection and writes it, but has no
  # orphan-removal step: a file in old state.files but absent from the new projection
  # is left on disk. Exposed by the kiro alias migration (.kiro/agents/<n>.json
  # orphaned when kiro-ide re-renders <n>.md — kiro-ide loads both, creating a
  # duplicate with stale hooks). Test: @unittest.expectedFailure pinned in
  # test_upgrade_user_hooks.py::LegacyKiroJsonUpgradeMigrationTests.
  # Fix: upgrade grows a Tier-1 orphan-removal pass (old state.files ∖ new
  #   projection) ordered against hook-wiring unproject, gated to whole-pack upgrades.
  # Unblocks when: someone picks up the upgrade command refactor.
  {slug = "upgrade-orphan-removal-on-projection-shape-change", source = "spec/kiro-install-alias-parity AC8"},

  # Security (AST09). No auditable inventory records per-skill version + content hash
  # + scan status for the installed set; no logged-execution trail ties an agent
  # action back to the skill version that instructed it. The agentbundle install
  # markers and state files provide a partial record but carry no per-skill content-
  # hash or scan-status fields.
  # Fix: extend the install-marker schema to include content hash + scan status per
  #   skill, OR document that the install marker IS the sanctioned governance surface
  #   and flag the missing hash field as the AST09 closure condition in agentic-skills.md.
  # Unblocks when: a governance RFC or install-marker schema extension closes the gap.
  {slug = "skill-governance-inventory-gap"},

  # Security (AST07). The agentic-skills module's AST07 check (version drift)
  # delegates to a wired SCA scanner. Whether pip-audit or Dependabot is wired in CI
  # for packages/agentbundle's dependency set was not confirmed during the
  # owasp-ast10-module security audit.
  # Fix: confirm pip-audit (or Dependabot) is wired in CI for packages/agentbundle;
  #   wire it if not.
