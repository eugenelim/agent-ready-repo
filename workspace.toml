# ─────────────────────────────────────────────────────────────────────────────
# ini-003 · Digital Experience Doctrine
#
# Cross-pack doctrine update across experience-design, product-engineering,
# product-strategy, and core (frontend-engineering). Mission: change the
# definition of done so digital work is complete only when it produces an
# observable outcome, not merely a valid artifact or green build.
#
# Introduces the Digital Experience Contract as the shared cross-pack primitive.
# Closes all phantom handoffs (design-system-foundations, copy-direction
# boundary, voice-and-microcopy). Requires the following pre-implementation
# decisions to be ratified in RFC-0071 before any M1+ spec starts:
#   1. Contract storage: pack-local references/digital-experience-contract.md
#      with deterministic drift check (preserves independent installability).
#   2. voice-and-microcopy stays in product-engineering; frontmatter boundary
#      wording updated in both packs.
#   3. design-system-foundations as new XD skill (distinct job: apply the
#      token taxonomy; distinct from design-system which derives the method).
#   4. copy-direction extends tone-of-voice frontmatter; not a new skill.
#   5. FE four modes (create/retrofit/audit/verify) as conditional sections
#      within one SKILL.md, not separate skills.
# ─────────────────────────────────────────────────────────────────────────────
